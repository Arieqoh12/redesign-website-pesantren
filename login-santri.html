<!doctype html>
<html lang="id">
  <link rel="stylesheet" href="style.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Santri</title>

    <link rel="stylesheet" href="login-santri.css" />
  </head>
  <body>
    <div class="santri-login-container">
      <div class="santri-login-card">
        <div class="santri-login-left">
          <img src="images/v269_54.png" alt="Logo Darussalam" />
          <a href="index.html" class="santri-kembali"> ← Kembali ke Beranda </a>

          <h1>Login Santri</h1>

          <p>Pondok Pesantren Darussalam Purwokerto</p>
        </div>

        <div class="santri-login-right">
          <form id="loginForm">
            <h2>Masuk Akun</h2>

            <input
              type="text"
              id="username"
              placeholder="Nomor Induk Santri"
              required
            />

            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />

            <button type="submit">Login</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="santri-dashboard" id="dashboard">
      <header class="santri-header">
        <h2>Dashboard Santri</h2>

        <button onclick="logoutSantri()">Logout</button>
      </header>

      <div class="santri-menu-container">
        <div class="santri-menu-card">
          📖
          <h3>Jadwal Pelajaran</h3>
        </div>

        <div class="santri-menu-card">
          🕌
          <h3>Jadwal Mengaji</h3>
        </div>

        <div class="santri-menu-card">
          💰
          <h3>Pembayaran Syahriyah</h3>
        </div>

        <div class="santri-menu-card">
          📊
          <h3>Nilai Akademik</h3>
        </div>

        <div class="santri-menu-card">
          📢
          <h3>Pengumuman</h3>
        </div>

        <div class="santri-menu-card">
          🛏️
          <h3>Data Kamar</h3>
        </div>

        <div class="santri-menu-card">
          📚
          <h3>Perpustakaan</h3>
        </div>

        <div class="santri-menu-card">
          👤
          <h3>Profil Santri</h3>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let user = document.getElementById("username").value;
          let pass = document.getElementById("password").value;

          if (user !== "" && pass !== "") {
            document.querySelector(".santri-login-container").style.display =
              "none";

            document.getElementById("dashboard").style.display = "block";
          }
        });

      function logoutSantri() {
        document.getElementById("dashboard").style.display = "none";

        document.querySelector(".santri-login-container").style.display =
          "flex";
      }
    </script>
  </body>
</html>
